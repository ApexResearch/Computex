version: '3.8'

services:
  # Main Computex application
  computex:
    build: .
    container_name: computex_app
    ports:
      - "8080:8080"
    environment:
      COMPUTEX_ENV: development
      DATABASE_URL: postgres://computex_user:computex_password@postgres:5432/computex
      REDIS_URL: redis://redis:6379
      JWT_SECRET: dev-super-secret-key-change-in-production
      LOG_LEVEL: debug
      COMPUTEX_HOST: 0.0.0.0
      COMPUTEX_PORT: 8080
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./logs:/home/computex/logs
    networks:
      - computex_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

  # PostgreSQL database
  postgres:
    image: postgres:15-alpine
    container_name: computex_postgres
    environment:
      POSTGRES_DB: computex
      POSTGRES_USER: computex_user
      POSTGRES_PASSWORD: computex_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - computex_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U computex_user"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis cache
  redis:
    image: redis:7-alpine
    container_name: computex_redis
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - computex_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Optional: Prometheus for metrics
  prometheus:
    image: prom/prometheus:latest
    container_name: computex_prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
    networks:
      - computex_network
    depends_on:
      - computex

  # Optional: Grafana for visualization
  grafana:
    image: grafana/grafana:latest
    container_name: computex_grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - grafana_data:/var/lib/grafana
    networks:
      - computex_network
    depends_on:
      - prometheus

volumes:
  postgres_data:
  redis_data:
  prometheus_data:
  grafana_data:

networks:
  computex_network:
    driver: bridge
